<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>企業評価・比較 - JobTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <a href="dashboard.html">JobTracker</a>
    </div>
    <a href="dashboard.html" class="menu-item">ダッシュボード</a>
    <a href="applications.html" class="menu-item">応募管理</a>
    <a href="comparison.html" class="menu-item active">企業評価・比較</a>
    <a href="profile.html" class="menu-item">プロフィール</a>
    <a href="settings.html" class="menu-item">設定</a>
  </div>

  <div class="main">
    <div class="header">
      <h1>企業評価・比較</h1>
    </div>

    <div class="form-container" style="max-width: 100%; margin-bottom: 30px;">
      <h3 style="margin-bottom: 15px; color: #c9d1d9; font-size: 16px;">🏢 企業の評価を入力・更新する</h3>
      
      <div id="comparison-form">
        <div class="form-group" style="margin-bottom: 15px;">
          <label for="comp-company-select">企業を選ぶ <span class="required-badge" style="background:#7c3aed;">連動</span></label>
          <select id="comp-company-select" class="form-select">
            <option value="">-- 応募管理から企業を選択 --</option>
          </select>
        </div>

        <div class="form-row" style="margin-bottom: 15px;">
          <div class="form-group">
            <label for="score-salary">💰 給与・福利厚生</label>
            <select id="score-salary" class="form-select">
              <option value="5">★★★★★ (大満足)</option>
              <option value="4">★★★★☆ (満足)</option>
              <option value="3" selected>★★★☆☆ (普通)</option>
              <option value="2">★★☆☆☆ (少し不満)</option>
              <option value="1">★☆☆☆☆ (不満)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="score-location">📍 勤務地・通勤</label>
            <select id="score-location" class="form-select">
              <option value="5">★★★★★ (通いやすい)</option>
              <option value="4">★★★★☆ (許容範囲内)</option>
              <option value="3" selected>★★★☆☆ (普通)</option>
              <option value="2">★★☆☆☆ (やや遠い)</option>
              <option value="1">★☆☆☆☆ (遠すぎる)</option>
            </select>
          </div>
        </div>

        <div class="form-row" style="margin-bottom: 15px;">
          <div class="form-group">
            <label for="score-work">💼 仕事内容・興味</label>
            <select id="score-work" class="form-select">
              <option value="5">★★★★★ (やりたい事ドンピシャ)</option>
              <option value="4">★★★★☆ (楽しそう)</option>
              <option value="3" selected>★★★☆☆ (普通・やれそう)</option>
              <option value="2">★★☆☆☆ (あまり興味ない)</option>
              <option value="1">★☆☆☆☆ (やりたくない)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="score-culture">📅 働きやすさ・休日</label>
            <select id="score-culture" class="form-select">
              <option value="5">★★★★★ (理想的な環境)</option>
              <option value="4">★★★★☆ (良好)</option>
              <option value="3" selected>★★★☆☆ (普通)</option>
              <option value="2">★★☆☆☆ (少し懸念あり)</option>
              <option value="1">★☆☆☆☆ (厳しそう)</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label for="comp-memo">📝 特記事項・選考メモ</label>
          <input type="text" id="comp-memo" placeholder="例: 面接官の雰囲気が良かった、研修制度が充実している、など">
        </div>

        <button id="save-btn" class="btn-submit">評価を保存・更新する</button>
      </div>
    </div>

    <h2 style="font-size: 20px; margin-bottom: 15px; color: #c9d1d9;">📊 企業評価ランキング一覧</h2>
    <div id="comparison-list-container"></div>
  </div>

  <script>
    const API_BASE = 'https://job-app--job-app-874ad.asia-east1.hosted.app';
    function convertToStars(score) {
        const num = parseInt(score);
        return '★'.repeat(num) + '☆'.repeat(5 - num);
    }

    // APIから応募一覧を取得
    async function fetchApplications() {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/api/applications`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error('取得失敗');
            const data = await res.json();
            return data.applications || [];
        } catch (e) {
            console.error('応募データの取得に失敗しました:', e);
            return [];
        }
    }

// 企業選択プルダウンを生成
function renderCompanySelect(applications) {
    const companySelect = document.getElementById('comp-company-select');
    companySelect.innerHTML = '<option value="">-- 応募管理から企業を選択 --</option>';
    applications.forEach(app => {
        const option = document.createElement('option');
        option.value = app.id;
        option.textContent = `${app.companyName} [${app.jobTitle}]`;
        companySelect.appendChild(option);
    });
}

// 評価ランキング一覧を描画（DBのデータを使用）
function renderRankingList(applications) {
    const listContainer = document.getElementById('comparison-list-container');

    // 4項目のうち1つでも評価が入っているものだけ表示
    const ratedApps = applications.filter(app =>
        app.ratingSalary > 0 || app.ratingHoliday > 0 ||
        app.ratingLocation > 0 || app.ratingWork > 0
    );

    if (ratedApps.length === 0) {
        listContainer.innerHTML = `
            <div class="card" style="text-align: center; color: #8b949e; padding: 40px 20px;">
                <p>評価された企業はまだありません。</p>
                <p style="font-size: 14px; color: #6e7681; margin-top: 5px;">上のフォームから企業を選んで評価を入力してください。</p>
            </div>
        `;
        return;
    }

    // 4項目の平均スコアで降順ソート
    ratedApps.sort((a, b) => {
        const avgA = (a.ratingSalary + a.ratingHoliday + a.ratingLocation + a.ratingWork) / 4;
        const avgB = (b.ratingSalary + b.ratingHoliday + b.ratingLocation + b.ratingWork) / 4;
        return avgB - avgA;
    });

    // 💡 フロント独自保存のメモデータをlocalStorageから読み込む
    const localMemos = JSON.parse(localStorage.getItem('localMemos') || '{}');

    listContainer.innerHTML = '';
    ratedApps.forEach((app, index) => {
        // 💡 サーバー上のapp.memoが空でも、フロント独自の保存場所にあればそちらを使う
        const savedMemo = localMemos[app.id] || app.memo || '';

        listContainer.innerHTML += `
            <div class="card" style="margin-bottom: 20px; position: relative; border-left: 5px solid #7c3aed;">
                <span style="position: absolute; top: 15px; left: 15px; background: #21262d; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; color: #7c3aed;">
                    RANK ${index + 1}
                </span>
                <div style="padding-left: 60px;">
                    <h3 style="font-size: 18px; margin-bottom: 5px;">${app.companyName}</h3>
                    <p style="font-size: 13px; color: #8b949e; margin-bottom: 15px;">
                        💼 職種: ${app.jobTitle}
                    </p>
                    <div class="form-row" style="font-size: 14px; color: #c9d1d9; margin-bottom: 15px; gap: 10px 20px;">
                        <div><span style="color: #8b949e; margin-right: 8px;">給与・福利:</span> <span style="color: #ffb100;">${convertToStars(app.ratingSalary)}</span></div>
                        <div><span style="color: #8b949e; margin-right: 8px;">勤務地・通勤:</span> <span style="color: #ffb100;">${convertToStars(app.ratingLocation)}</span></div>
                        <div><span style="color: #8b949e; margin-right: 8px;">仕事内容・興味:</span> <span style="color: #ffb100;">${convertToStars(app.ratingWork)}</span></div>
                        <div><span style="color: #8b949e; margin-right: 8px;">環境・休日面:</span> <span style="color: #ffb100;">${convertToStars(app.ratingHoliday)}</span></div>
                    </div>
                    <div class="comp-card-memo" style="margin-top: 15px; padding-top: 12px; border-top: 1px dashed #30363d; font-size: 14px; color: #c9d1d9;">
                        <strong style="color: #7c3aed; font-size: 13px; display: block; margin-bottom: 4px;">📝 特記事項・選考メモ:</strong>
                        <div>${savedMemo ? savedMemo.replace(/\n/g, '<br>') : '<span style="color:#8b949e;">なし</span>'}</div>
                    </div>
                </div>
                <button onclick="resetRating(${app.id})" style="position: absolute; top: 15px; right: 15px; background: transparent; color: #f85149; border: none; cursor: pointer; font-size: 13px;">評価をリセット</button>
            </div>
        `;
    });
}

// ページ全体の初期化・再描画
async function renderComparisonPage() {
    const applications = await fetchApplications();
    renderCompanySelect(applications);
    renderRankingList(applications);
}

// 評価の保存・更新（PUTリクエストでDBへ）
document.getElementById('save-btn').addEventListener('click', async function () {
    const jobId = document.getElementById('comp-company-select').value;
    if (!jobId) {
        alert('企業を選択してください。');
        return;
    }

    const memoValue = document.getElementById('comp-memo').value;

    const token = localStorage.getItem('token');
    try {
        const res = await fetch(`${API_BASE}/api/applications/${jobId}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ratingSalary: parseInt(document.getElementById('score-salary').value),
                ratingHoliday: parseInt(document.getElementById('score-culture').value),
                ratingLocation: parseInt(document.getElementById('score-location').value),
                ratingWork: parseInt(document.getElementById('score-work').value),
                memo: memoValue // 👈 バックエンド用コードはそのまま崩さず残します
            })
        });

        if (!res.ok) throw new Error('保存失敗');

        // 💡 【フロント側での対策】サーバーが無視しても良いように、localStorageにメモを直接保存
        const localMemos = JSON.parse(localStorage.getItem('localMemos') || '{}');
        localMemos[jobId] = memoValue;
        localStorage.setItem('localMemos', JSON.stringify(localMemos));

        // フォームをリセット
        document.getElementById('comp-company-select').value = '';
        document.getElementById('score-salary').value = '3';
        document.getElementById('score-location').value = '3';
        document.getElementById('score-work').value = '3';
        document.getElementById('score-culture').value = '3';
        document.getElementById('comp-memo').value = ''; // 保存成功後にメモの入力欄を確実に空っぽにクリア

        await renderComparisonPage();
        alert('企業評価を保存しました！');

    } catch (e) {
        console.error('評価の保存に失敗しました:', e);
        alert('保存に失敗しました。もう一度お試しください。');
    }
});

// 評価のリセット（4項目を0に戻す）
async function resetRating(jobId) {
    if (!confirm('この企業の評価をリセットしますか？')) return;

    const token = localStorage.getItem('token');
    try {
        const res = await fetch(`${API_BASE}/api/applications/${jobId}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ratingSalary: 0,
                ratingHoliday: 0,
                ratingLocation: 0,
                ratingWork: 0,
                memo: ''
            })
        });

        if (!res.ok) throw new Error('リセット失敗');

        // 💡 【フロント側での対策】リセット時はフロント側のメモも一緒に削除する
        const localMemos = JSON.parse(localStorage.getItem('localMemos') || '{}');
        delete localMemos[jobId];
        localStorage.setItem('localMemos', JSON.stringify(localMemos));

        await renderComparisonPage();

    } catch (e) {
        console.error('評価のリセットに失敗しました:', e);
        alert('リセットに失敗しました。もう一度お試しください。');
    }
}

// 初期化
window.onload = async function () {
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
    }
    await renderComparisonPage();
};
</script>
</body>
</html>
