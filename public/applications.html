<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>応募管理 - JobTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <a href="dashboard.html">JobTracker</a>
    </div>
    <a href="dashboard.html" class="menu-item">ダッシュボード</a>
    <a href="applications.html" class="menu-item active">応募管理</a>
    <a href="comparison.html" class="menu-item">企業評価・比較</a>
    <a href="profile.html" class="menu-item">プロフィール</a>
    <a href="settings.html" class="menu-item">設定</a>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>応募管理 求人一覧</h1>
      </div>
      <div>
        <a href="add-application.html" class="btn btn-green nav-register-btn">+ 新規求人を登録する</a>
      </div>
    </div>
    <div class="settings-container">
      <div id="job-list-container" class="job-list-wrapper"></div>
    </div>
  </div>

  <script>
    // 📊 画面への表示処理
    async function renderJobList() {
      const token = localStorage.getItem('token');

      // ✅ トークンがなければログイン画面へ
      if (!token) {
        window.location.href = 'index.html';
        return;
      }

      const res = await fetch('https://job-app--job-app-874ad.asia-east1.hosted.app/api/applications', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const allJobs = data.applications || [];
      const container = document.getElementById('job-list-container');
      container.innerHTML = "";

      if (allJobs.length === 0) {
        container.innerHTML = `
          <div class="card no-jobs-card">
            <p>登録されている求人はありません。</p>
            <p class="no-jobs-sub">右上のボタン、またはGmail同期から求人を登録してください。</p>
          </div>
        `;
        return;
      }

      allJobs.forEach(job => {
        // 基本情報の取得
        const jobTitle    = job.jobTitle    || '職種未設定';
        const companyName = job.companyName || '企業名未設定';
        const status      = job.status      || '応募中';
        const source      = job.source      || 'その他';
        const number      = source;   // 求人番号の代わりに応募媒体を表示

        // 💡 就業場所の復元
        const location = job.companyUrl && job.companyUrl.startsWith('就業場所: ') 
          ? job.companyUrl.replace('就業場所: ', '') 
          : '未設定';

        // 💡 賃金の復元
        const salary = job.ratingSalary && job.ratingSalary > 0 
          ? `${job.ratingSalary.toLocaleString()}円～` 
          : '未設定';

        // 💡 就業時間の復元
        const hours = job.deadlineDate && job.deadlineDate.startsWith('時間: ') 
          ? job.deadlineDate.replace('時間: ', '') 
          : '未設定';

        // 💡 休日の判定ロジックを正確に修正
        let holiday = '未設定';
        if (job.ratingHoliday === 5) {
          holiday = '完全週休二日制（土日祝）';
        } else if (job.ratingHoliday === 3) {
          holiday = 'シフト制';
        }

        // 💡 特徴の復元（頭の「特徴: 」という文字をきれいに消して中身だけにする）
        const features = job.belongings && job.belongings.startsWith('特徴: ') 
          ? job.belongings.replace('特徴: ', '') 
          : '';

        const bonus = '未設定'; 

        // 元々のHTMLレイアウト
        const cardHtml = `
          <div class="card job-card-row">
            <div class="block-main">
              <div class="meta-info">
                <span class="badge-status">${status}</span>
                <span class="job-number">応募媒体：${number}</span>
              </div>
              <h3 class="job-title">${jobTitle}</h3>
              <p class="company-name">
                <span>${companyName}</span>
              </p>
            </div>
            <hr class="card-divider">
            <div class="block-conditions">
              <div class="cond-item"><span class="cond-label">就業場所</span><span class="cond-value">${location}</span></div>
              <div class="cond-item"><span class="cond-label">賃金</span><span class="cond-value">${salary}</span></div>
              <div class="cond-item"><span class="cond-label">就業時間</span><span class="cond-value">${hours}</span></div>
              <div class="cond-item"><span class="cond-label">賞与</span><span class="cond-value">${bonus}</span></div>
              <div class="cond-item"><span class="cond-label">休日</span><span class="cond-value">${holiday}</span></div>
              ${features ? `<div class="cond-item"><span class="cond-label">特徴</span><span class="cond-value">${features}</span></div>` : ''}
            </div>
            <div class="block-actions applications-actions">
              <button class="btn-delete" onclick="deleteJob(${job.id})" title="この求人を削除する">削除</button>
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    }

    // 🗑️ 削除処理（APIで削除）
    async function deleteJob(jobId) {
      if (!confirm('この求人情報を削除してもよろしいですか？')) return;
      const token = localStorage.getItem('token');

      const res = await fetch(`https://job-app--job-app-874ad.asia-east1.hosted.app/api/applications/${jobId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.ok) {
        renderJobList();
      } else {
        alert('削除に失敗しました。');
      }
    }

    // 🌟 ライトモード連動 & 初回読み込み
    window.onload = function() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
      }

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('gmail_sync') === 'success') {
        alert('🎉 Gmailとの連携が正常に完了しました！');
        history.replaceState({}, document.title, window.location.pathname);
      }
      renderJobList();
    };
  </script>
</body>
</html>
