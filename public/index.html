<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Login-JobTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>おかえりなさいませ</h1>
      <p>JobTrackerにログインして管理を再開しよう</p>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" placeholder="・・・・・・・・" required>
        </div>
        <button type="submit" class="auth-btn">ログイン</button>
      </form>
      <div class="auth-footer">
        アカウントをお持ちでないですか？<a href="register.html">新規登録</a>
      </div>
    </div>
  </div>
  <script>
    async function handleLogin(event) {
  event.preventDefault();
  const email = document.querySelector('input[type="email"]').value;
  const password = document.querySelector('input[type="password"]').value;

  const res = await fetch('https://job-app--job-app-874ad.asia-east1.hosted.app/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('token', data.token); // JWTを保存
    window.location.href = 'dashboard.html';
  } else {
    alert(data.message);
    }
  }
  </script>
</body>
</html>
