<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Settings-JobTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo">JobTracker</div>
    <a href="dashboard.html" class="menu-item">ダッシュボード</a>
    <a href="applications.html" class="menu-item">応募管理</a>
    <a href="comparison.html" class="menu-item">企業評価・比較</a>

    <a href="settings.html" class="menu-item active">設定</a>
  </div>
  <div class="main">
    <div class="header">
      <h1>設定</h1>
    </div>
    <div class="settings-container">

      <div class="card settings-section">
        <h2>アカウント設定</h2>
        <form class="register-form" onsubmit="saveProfile(event)">
          <div class="form-row">
            <div class="form-group">
              <label>ユーザー名</label>
              <input type="text" value="ポリテク 三郎" required>
            </div>
            <div class="form-group">
              <label>メールアドレス</label>
              <input type="email" value="aaaaaa@mail.com" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>新しいパスワード</label>
              <input type="password" placeholder="変更する場合のみ入力">
            </div>
            <div class="form-group">
              <label>パスワード（確認）</label>
              <input type="password" placeholder="変更する場合のみ入力">
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-submit">変更を保存</button>
          </div>
        </form>
      </div>

      <div class="card settings-section">
        <h2>外観設定</h2>
        <div class="form-group">
          <label class="theme-switch-label">
            <span>ライトモードを有効にする</span>
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
          </label>
        </div>
      </div>

      <div class="card settings-section">
        <h2>外部サービス連携</h2>
        <div class="form-group" style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <span style="font-weight: bold;">Gmail自動連係</span>
            <span class="status-badge" id="gmail-status">連携中</span>
            <p style="color: #8b949e; font-size: 14px; margin-top: 5px;">最終同期：〇分前</p>
          </div>
          <button class="btn-cancel" id="gmail-btn" onclick="toggleGmail()" style="padding: 8px 16px;">連係解除</button>
        </div>
      </div>
      <div class="card settings-section">
        <h2>通知設定</h2>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" checked>
            <span>面接スケジュールの前日リマインド通知を受け取る</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" checked>
            <span>Gmailから新しい応募情報を取り込んだときに通知する</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox">
            <span>選考ステータスに動きがない企業のアラート通知</span>
          </label>
        </div>
      </div>
      <div class="card settings-section danger-zone">
        <h2>危険ゾーン</h2>
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <span style="font-weight: bold; color: #f85149;">アカウント削除</span>
            <p style="color: #8b949e; font-size: 14px; margin-top: 5px;">全ての応募データ、企業評価が完全に削除され、復元できなくなります</p>
          </div>
          <button class="btn-danger" onclick="deleteAccout()">退会する</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    // ページが読み込まれた瞬間に実行される処理
    window.onload = function() {
      const savedTheme = localStorage.getItem('theme');
      const checkbox = document.getElementById('theme-toggle');

      // もし過去に「light」と保存されていたら、ライトモードを適用してチェックを入れる
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        if (checkbox) checkbox.checked = true;
      }
      
      // 最初は画面の見た目を「未連携（または連携解除中）」にしておくのが安全です
      // 初期状態のコントロールをここで行うことも可能です
    };

    // テーマ切り替え（記憶を保存する機能付き）
    function toggleTheme() {
      const checkbox = document.getElementById('theme-toggle');
      if (checkbox.checked) {
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light'); // ブラウザに「ライト」と記憶させる
      } else {
        document.body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark'); // ブラウザに「ダーク」と記憶させる
      }
    }

    // プロフィール保存
    function saveProfile(event) {
      event.preventDefault();
      alert('アカウント情報を更新しました。');
    }

    // 🔗 Gmail連携の切り替え ＆ API接続処理
    async function toggleGmail() {
      const statusBadge = document.getElementById('gmail-status');
      const gmailBtn = document.getElementById('gmail-btn');

      // 【パターンA】現在すでに「連携中」の場合（解除する処理）
      if (statusBadge.textContent === '連携中') {
        if (confirm('本当にGmailとの自動連係を解除しますか？\n解除するとメールからの自動取り込みが停止します。')) {
          
          // 💡 ここに将来的にバックエンドの「連携解除API（DELETEなど）」を呼ぶ処理を入れます
          
          statusBadge.textContent = '連携解除中';  // バッジの文字を変更
          statusBadge.style.background = '#8b949e'; // バッジの色をグレー（未連携色）に変更
          gmailBtn.textContent = '連携する'; // ボタンの文字を「連携する」に変更
          alert('連携を解除しました。');
        }
      } 
      // 【パターンB】現在「未連携・連携解除中」の場合（新しく認証を開始する処理）
      else {
        if (!confirm('Gmailとの自動連係を開始しますか？\nGoogleのログイン画面へ移動します。')) {
          return; // キャンセルされたら何もしない
        }

        // 🔑 ログイン時に保存したトークンを取得
        const token = localStorage.getItem('token'); 

        if (!token) {
          alert('ログインセッションが切れています。再ログインしてください。');
          window.location.href = 'login.html'; // ログイン画面へ飛ばす
          return;
        }

        try {
          // 1. バックエンドにGoogleの認証URLを要求する
          const response = await fetch('http://localhost:3000/api/auth/google/url', {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}` // 🔒 会員証（トークン）を添付！
            }
          });

          if (!response.ok) {
            throw new Error('認証URLの取得に失敗しました。');
          }

          const data = await response.json();
          
          // 2. 返ってきたGoogleのログインURLへ画面ごとジャンプさせる！
          if (data.url) {
            window.location.href = data.url; 
          }

        } catch (error) {
          console.error('エラー:', error);
          alert('Google連携の準備中にエラーが発生しました。');
        }
      }
    }

    // アカウント退会（2段階チェック）
    function deleteAccout() {
      const firstCheck = confirm('本当に退会しますか？この操作は取り消せません。');
      if (firstCheck) {
        const secondCheck = confirm('最終確認です。データは全て消去されます。本当によろしいですか？');
        if (secondCheck) {
          alert('アカウントを削除しました。ご利用ありがとうございました。');
          window.location.href = 'login.html'; // ログイン画面へ強制遷移
        }
      }
    }
  </script>
</body>
</html>
